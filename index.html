<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="images.png">
    <title>Catálogo Evento Hebling</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="hero">

        <div class="hero-content">

            <h1>🍺 Bar Hebling</h1>

            <p class="subtitle">
                Produtos encontrados com valor de até <strong>R$ 60,00</strong>
            </p>

            <div class="warning">

                <span>⚠️</span>

                <div>

                    <strong>Atenção</strong>

                    <p>
                        Este catálogo foi gerado automaticamente por extração de dados do cardápio original.
                        Não é o menu oficial, apenas um utilitário para o evento atual!
                    </p>

                </div>

            </div>

        </div>

    </header>

    <main class="container">

        <section class="info">

            <div>
                <span id="productCount">0</span>
                Produtos
            </div>

            <div>
                Atualizado em
                <span id="generatedDate">--</span>
            </div>

        </section>

        <div class="search-area">

            <input
                type="text"
                id="search"
                placeholder="🔎 Pesquisar produto..."
            >

        </div>

        <nav id="sectionsNav"></nav>

        <div id="catalog"></div>

    </main>

    <script src="script.js"></script>

</body>

</html>
